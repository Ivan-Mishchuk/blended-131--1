<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Box Model</title>
    <link rel="stylesheet" href="./test.css" />
  </head>

  <body>
    <form class="form">
      <label class="form-label">
        Email
        <input
          class="form-input"
          type="email"
          name="email"
          placeholder="example@email.com"
          required
        />
      </label>
      <!-- Додай поле для повідомлення -->
      <label class="form-label">
        Comment
        <textarea
          class="form-textarea"
          name="coment"
          rows="10"
          placeholder="Enter your messenge"
        ></textarea>
      </label>
      <button class="form-button" type="submit">Send message</button>
    </form>
  </body>
</html>
